name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 7.6.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.6.4'

      - name: Decode DEBUG_KEY keystore
        run: echo "${{ secrets.DEBUG_KEY }}" | base64 -d > $GITHUB_WORKSPACE/debug.keystore

      - name: Build Signed APK (minSdkVersion 14 - Android 4.0+)
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/debug.keystore
          KEYSTORE_PASS: android
          KEY_ALIAS: androiddebugkey
          KEY_PASS: android
        run: gradle assembleRelease

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: app/build/outputs/apk/release/app-release.apk
